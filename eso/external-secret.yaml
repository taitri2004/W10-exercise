# Lab 2.1 — ExternalSecret: map key store -> K8s Secret `db-secret` trong ns demo.
# refreshInterval 10s để rotate < 60s. Consumer mount volume (không env) -> no restart.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
spec:
  refreshInterval: 10s
  secretStoreRef:
    name: fake-store
    kind: ClusterSecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: demo/db/password
