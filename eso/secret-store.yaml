# Lab 2.1 — SecretStore. Mặc định provider `fake` (offline, không cần AWS) để
# chứng minh cơ chế trên minikube. Rotate = sửa value (+version) rồi commit.
# Bản AWS thật xem secret-store.aws.yaml.example.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: fake-store
spec:
  provider:
    fake:
      data:
        - key: demo/db/password
          value: v1-rotate-me
          version: v1
