# Consumer đọc db-secret qua VOLUME -> Secret đổi thì file trong pod tự cập nhật, KHÔNG restart.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-consumer
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: db-consumer }
  template:
    metadata:
      labels:
        app: db-consumer
        owner: team-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - while true; do echo "$(date +%T) password=$(cat /etc/secret/password)"; sleep 5; done
          volumeMounts:
            - name: db
              mountPath: /etc/secret
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
      volumes:
        - name: db
          secret:
            secretName: db-secret
