# Bài lớn #1 — RBAC least-privilege cho payments-dev:
# Role + RoleBinding BÓ trong ns payments, chỉ verbs trên workload.
# CỐ Ý bỏ `secrets` và `rolebindings` (không đọc secret, không tự nâng quyền).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-developer
  namespace: payments
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # KHÔNG có rule cho secrets, roles, rolebindings -> can-i = no
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-binding
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: payments-developer
subjects:
  - kind: User
    name: payments-dev
    apiGroup: rbac.authorization.k8s.io
