# Bài lớn #3 — cô lập mạng. Cần CNI enforce (minikube --cni=calico).
# (1) default-deny INGRESS: chặn mọi traffic VÀO payments.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: payments
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
# (2) EGRESS chỉ cho cùng namespace + DNS (chặn payments gọi ra demo).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-same-ns-and-dns
  namespace: payments
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
