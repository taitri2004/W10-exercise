# ArgoCD App: ConstraintTemplate (wave 2) + Constraint (wave 3) từ fork.
# Wave 2 (App-level) = chạy SAU khi controller gatekeeper (wave 0) đã lên.
# retry vì template/constraint có thể apply trước khi webhook gatekeeper sẵn sàng.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/taitri2004/W10-exercise.git
    path: gatekeeper
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2
