# Bài lớn — App hạ tầng tenant: ns + rbac + quota + netpol (tenants/payments/).
# Không recurse -> bỏ qua test/ (manifest demo apply tay).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/taitri2004/W10-exercise.git
    path: tenants/payments
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
