# ArgoCD App: cài OPA Gatekeeper controller (Helm). Wave 0 = sớm, trước constraint.
# replicas=1 cho cluster RAM thấp (mặc định chart là 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.17.1
    helm:
      values: |
        replicas: 1
        audit:
          resources:
            limits: { cpu: 500m, memory: 512Mi }
        controllerManager:
          resources:
            limits: { cpu: 500m, memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
